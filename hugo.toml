baseURL = "https://www.alexlaird.com/"
languageCode = "en-US"
title = "Alex Laird"
theme = "PaperMod"
googleAnalytics = "G-3M6BSPTNBS"

[pagination]
  pagerSize = 10

[permalinks]
  [permalinks.page]
    posts = '/:year/:month/:slug/'

[taxonomies]
  tag = "tags"

[params]
  description = "Staff Engineer @ Twilio · Open Source Maintainer"
  author = "Alex Laird"
  showReadingTime = true
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true
  showRssButtonInSectionTermList = true

  [params.assets]
    favicon = "/favicon.png"

  [params.analytics.google]
    SiteVerificationTag = "bVteyR4ELhNItmLQUA-l1R1XvJVTn2KdXohwVsOpSVc"

  [params.analytics.bing]
    SiteVerificationTag = "6E0F6B6DA9948D114F019022BB13F73F"

  [params.profileMode]
    enabled = true
    title = "Alex Laird"
    subtitle = "Staff Engineer @ Twilio · Open Source Maintainer"
    imageUrl = "https://avatars.githubusercontent.com/u/1660326?v=4"
    imageWidth = 150
    imageHeight = 150

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/alexdlaird"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/alexdlaird/"

  [[params.socialIcons]]
    name = "patreon"
    url = "https://www.patreon.com/alexdlaird/membership"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/blog/"
    weight = 2

  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 3
